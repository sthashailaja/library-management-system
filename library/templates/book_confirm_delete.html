{% extends 'base.html' %}
{% block title %}Delete Book{% endblock %}
{% block content %}
    <h1>Delete "{{ book.title }}"?</h1>
    <p>This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, delete</button>
        <a class="btn btn-secondary" href="{% url 'book_detail' book.pk %}">Cancel</a>
    </form>
{% endblock %}
