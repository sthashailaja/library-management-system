{% extends 'base.html' %}
{% block title %}All Authors{% endblock %}

{% block content %}
<h1>All Authors</h1>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Date of Birth</th>
        </tr>
    </thead>

    <tbody>
    {% for author in authors %}
        <tr>
            <td>
                <a href="{% url 'author_detail' author.pk %}">
                    {{ author.name }}
                </a>
            </td>
            <td>{{ author.date_of_birth|default:"Unknown" }}</td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="2">No authors yet.</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
